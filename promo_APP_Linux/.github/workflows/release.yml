name: desktop-release

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: npm run desktop:build:win
            artifact_name: promo_APP_Windows-installer
            artifact_path: release/*.exe
          - os: ubuntu-latest
            script: npm run desktop:build:linux
            artifact_name: promo_APP_Windows-linux-packages
            artifact_path: |
              release/*.AppImage
              release/*.deb
    env:
      PROMO_APP_WEB_DIR: ./promo_APP_Web
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout web client
        uses: actions/checkout@v4
        with:
          repository: caio-3htty/promo_APP_Web
          path: promo_APP_Web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix ./promo_APP_Web ci

      - name: Build desktop artifact
        run: ${{ matrix.script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

