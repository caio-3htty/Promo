name: master-waves-ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  waves:
    runs-on: windows-latest
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_TENANT_ID: ${{ secrets.SUPABASE_TENANT_ID || vars.SUPABASE_TENANT_ID }}
      VALIDATION_LOGIN_EMAIL: ${{ secrets.VALIDATION_LOGIN_EMAIL || vars.VALIDATION_LOGIN_EMAIL }}
      VALIDATION_LOGIN_PASSWORD: ${{ secrets.VALIDATION_LOGIN_PASSWORD || vars.VALIDATION_LOGIN_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || vars.RESEND_API_KEY }}
      CRITICAL_ALERT_FALLBACK_EMAIL: ${{ secrets.CRITICAL_ALERT_FALLBACK_EMAIL || vars.CRITICAL_ALERT_FALLBACK_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate critical env
        shell: pwsh
        run: |
          $missing = New-Object System.Collections.Generic.List[string]
          $required = @(
            "SUPABASE_SERVICE_ROLE_KEY",
            "SUPABASE_ANON_KEY",
            "VALIDATION_LOGIN_EMAIL",
            "VALIDATION_LOGIN_PASSWORD"
          )

          foreach ($key in $required) {
            if (-not (Get-Item -Path "Env:$key" -ErrorAction SilentlyContinue).Value) {
              $missing.Add($key)
            }
          }

          if (-not $env:SUPABASE_URL -and -not $env:SUPABASE_PROJECT_REF) {
            $missing.Add("SUPABASE_URL|SUPABASE_PROJECT_REF")
          }

          if ($missing.Count -gt 0) {
            throw "Missing critical CI env: $($missing -join ', ')"
          }

      - name: Install workspace dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix promo_APP_Web ci

      - name: Install android dependencies
        run: npm --prefix promo_APP_Android ci

      - name: Install windows dependencies
        run: npm --prefix promo_APP_Windows ci

      - name: Install owner windows dependencies
        run: npm --prefix promo_APP_OwnerWindows ci

      - name: Install linux dependencies
        run: npm --prefix promo_APP_Linux ci

      - name: Run waves (wave1 + wave2 + wave4)
        run: npm run test:waves:auto

      - name: Upload wave artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-waves-artifacts
          path: docs/test-runs/**
          if-no-files-found: warn
