name: smoke-rbac

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_TENANT_ID: ${{ secrets.SUPABASE_TENANT_ID }}
      SMOKE_GESTOR_EMAIL: ${{ secrets.SMOKE_GESTOR_EMAIL }}
      SMOKE_GESTOR_PASSWORD: ${{ secrets.SMOKE_GESTOR_PASSWORD }}
      SMOKE_OPERACIONAL_EMAIL: ${{ secrets.SMOKE_OPERACIONAL_EMAIL }}
      SMOKE_OPERACIONAL_PASSWORD: ${{ secrets.SMOKE_OPERACIONAL_PASSWORD }}
      SMOKE_ENGENHEIRO_EMAIL: ${{ secrets.SMOKE_ENGENHEIRO_EMAIL }}
      SMOKE_ENGENHEIRO_PASSWORD: ${{ secrets.SMOKE_ENGENHEIRO_PASSWORD }}
      SMOKE_ALMOXARIFE_EMAIL: ${{ secrets.SMOKE_ALMOXARIFE_EMAIL }}
      SMOKE_ALMOXARIFE_PASSWORD: ${{ secrets.SMOKE_ALMOXARIFE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_ANON_KEY"
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] && [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_PROJECT_REF"
            exit 1
          fi

      - name: Run smoke RBAC
        run: npm run smoke:rbac 2>&1 | tee smoke-rbac.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-rbac-${{ github.run_id }}
          path: smoke-rbac.log
          if-no-files-found: warn
