name: android-eas-build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    if: ${{ secrets.EXPO_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (android)
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive
